openapi: 3.1.0
info:
  title: Ăn Gì Giờ? API
  version: 0.1.0
  description: REST contract cho Recipe Catalog — Giai đoạn 1.
servers:
  - url: https://api-production-afd7.up.railway.app
    description: Railway production
  - url: http://localhost:4000
    description: Local development
paths:
  /health:
    get:
      tags: [System]
      summary: Kiểm tra trạng thái API
      responses:
        "200":
          description: API hoạt động
  /api/v1/categories:
    get:
      tags: [Categories]
      summary: Lấy danh sách danh mục
      responses:
        "200":
          description: Danh sách danh mục theo thứ tự hiển thị
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Đăng ký tài khoản bằng email và mật khẩu
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Đăng ký thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/Error"
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Đăng nhập bằng email và mật khẩu
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Đăng nhập thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/auth/google:
    post:
      tags: [Auth]
      summary: Đăng nhập bằng Google ID token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleLoginRequest"
      responses:
        "200":
          description: Đăng nhập Google thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "501":
          $ref: "#/components/responses/Error"
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Token mới
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Thu hồi refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "204":
          description: Đăng xuất thành công
        "400":
          $ref: "#/components/responses/ValidationError"
  /api/v1/me:
    get:
      tags: [Me]
      security:
        - bearerAuth: []
      summary: Lấy hồ sơ người dùng hiện tại
      responses:
        "200":
          description: Hồ sơ người dùng
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Me]
      security:
        - bearerAuth: []
      summary: Cập nhật hồ sơ người dùng hiện tại
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Hồ sơ sau cập nhật
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/me/saved-recipes:
    get:
      tags: [SavedRecipes]
      security:
        - bearerAuth: []
      summary: Lấy danh sách công thức đã lưu
      responses:
        "200":
          description: Danh sách công thức đã lưu
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SavedRecipe"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/me/saved-recipes/{slug}:
    post:
      tags: [SavedRecipes]
      security:
        - bearerAuth: []
      summary: Lưu công thức
      parameters:
        - $ref: "#/components/parameters/RecipeSlug"
      responses:
        "201":
          description: Công thức đã lưu
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    $ref: "#/components/schemas/SavedRecipe"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [SavedRecipes]
      security:
        - bearerAuth: []
      summary: Bỏ lưu công thức
      parameters:
        - $ref: "#/components/parameters/RecipeSlug"
      responses:
        "204":
          description: Đã bỏ lưu
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/recipes:
    get:
      tags: [Recipes]
      summary: Lấy danh sách công thức đã xuất bản
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: category
          in: query
          description: Slug hoặc tên danh mục
          schema:
            type: string
          examples:
            slug:
              value: mon-xao
            name:
              value: Món xào
        - name: difficulty
          in: query
          description: Có thể lặp lại để lọc nhiều độ khó
          schema:
            oneOf:
              - $ref: "#/components/schemas/RecipeDifficulty"
              - type: array
                items:
                  $ref: "#/components/schemas/RecipeDifficulty"
        - name: maxCookTimeMinutes
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1440
        - name: servings
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          schema:
            type: string
            enum: [difficulty-asc, cook-time-asc, newest]
            default: difficulty-asc
      responses:
        "200":
          description: Danh sách công thức và metadata phân trang
          content:
            application/json:
              schema:
                type: object
                required: [success, data, meta]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RecipeSummary"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "400":
          $ref: "#/components/responses/ValidationError"
  /api/v1/recommendations:
    post:
      tags: [Recommendations]
      security:
        - {}
        - bearerAuth: []
      summary: Gợi ý công thức theo danh sách nguyên liệu
      description: >
        Giai đoạn 2 ưu tiên matching trong database. Nếu không có recipe đạt
        ngưỡng RECOMMENDATION_MATCH_THRESHOLD, backend có thể gọi Gemini để tạo
        công thức mới, validate schema và lưu recipe với moderation_status PENDING.
        Recipe PENDING chỉ trả về cho request hiện tại, chưa xuất hiện trong
        catalog công khai.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationRequest"
      responses:
        "200":
          description: Danh sách công thức phù hợp với nguyên liệu
          content:
            application/json:
              schema:
                type: object
                required: [success, data, meta]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RecipeRecommendation"
                  meta:
                    $ref: "#/components/schemas/RecommendationMeta"
        "400":
          $ref: "#/components/responses/ValidationError"
  /api/v1/cooking-sessions:
    post:
      tags: [CookingSessions]
      security:
        - bearerAuth: []
      summary: Bat dau hoac tiep tuc phien nau
      description: >
        Neu user da co phien IN_PROGRESS cho cong thuc nay, API tra ve phien
        dang nau hien tai thay vi tao ban ghi trung.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartCookingSessionRequest"
      responses:
        "201":
          description: Phien nau da duoc tao hoac tim thay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CookingSessionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/cooking-sessions/{id}:
    patch:
      tags: [CookingSessions]
      security:
        - bearerAuth: []
      summary: Cap nhat tien do phien nau
      parameters:
        - $ref: "#/components/parameters/CookingSessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCookingSessionRequest"
      responses:
        "200":
          description: Phien nau sau khi cap nhat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CookingSessionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /api/v1/cooking-sessions/{id}/complete:
    post:
      tags: [CookingSessions]
      security:
        - bearerAuth: []
      summary: Hoan thanh phien nau
      description: Hanh dong idempotent; goi lai voi phien da hoan thanh se tra ve ket qua hien co.
      parameters:
        - $ref: "#/components/parameters/CookingSessionId"
      responses:
        "200":
          description: Phien nau da hoan thanh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CookingSessionResponse"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/cooking-sessions/{id}/feedback:
    post:
      tags: [Feedback]
      security:
        - bearerAuth: []
      summary: Gui feedback sau khi hoan thanh phien nau
      description: >
        Moi phien nau da hoan thanh co mot feedback. Goi lai endpoint nay se cap
        nhat feedback va tinh lai personalization insight cua user.
      parameters:
        - $ref: "#/components/parameters/CookingSessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitFeedbackRequest"
      responses:
        "201":
          description: Feedback da duoc luu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitFeedbackResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /api/v1/me/cooking-history:
    get:
      tags: [CookingSessions]
      security:
        - bearerAuth: []
      summary: Lay lich su nau cua user hien tai
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: sort
          in: query
          schema:
            type: string
            enum: [completed-at-desc, started-at-desc, rating-desc]
            default: completed-at-desc
      responses:
        "200":
          description: Danh sach phien nau da hoan thanh
          content:
            application/json:
              schema:
                type: object
                required: [success, data, meta]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CookingSession"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/me/personalization:
    get:
      tags: [Feedback]
      security:
        - bearerAuth: []
      summary: Lay insight ca nhan hoa cua user hien tai
      responses:
        "200":
          description: Insight ca nhan hoa tu feedback da gui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonalizationResponse"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/recipes/{slug}:
    get:
      tags: [Recipes]
      summary: Lấy chi tiết công thức theo slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
      responses:
        "200":
          description: Chi tiết công thức
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    $ref: "#/components/schemas/RecipeDetail"
        "404":
          description: Không tìm thấy công thức
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/admin/recipes:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Admin xem danh sách toàn bộ công thức
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/RecipeStatus"
        - name: source
          in: query
          schema:
            $ref: "#/components/schemas/RecipeSource"
        - name: moderationStatus
          in: query
          schema:
            $ref: "#/components/schemas/ModerationStatus"
      responses:
        "200":
          description: Danh sách công thức admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRecipeListResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
    post:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Admin tạo công thức thủ công
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AdminRecipeMultipartWriteRequest"
      responses:
        "201":
          description: Tạo công thức thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRecipeDetailResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
        "415":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /api/v1/admin/recipes/{id}:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Admin xem chi tiết công thức theo id
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Chi tiết công thức admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRecipeDetailResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Admin cập nhật công thức
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRecipePatchRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AdminRecipeMultipartPatchRequest"
      responses:
        "200":
          description: Cập nhật công thức thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRecipeDetailResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Admin soft-delete công thức bằng cách chuyển status sang HIDDEN
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "204":
          description: Công thức đã được ẩn
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/admin/recipes/{id}/moderation:
    patch:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Admin duyệt hoặc từ chối công thức do Gemini tạo
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminModerateRecipeRequest"
      responses:
        "200":
          description: Cập nhật trạng thái kiểm duyệt thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRecipeDetailResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /api/v1/admin/recipes/{id}/approve:
    post:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Admin duyệt công thức do Gemini tạo
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Công thức Gemini đã được duyệt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRecipeDetailResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /api/v1/admin/recipes/{id}/reject:
    post:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Admin từ chối công thức do Gemini tạo
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Công thức Gemini đã bị từ chối và ẩn khỏi catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRecipeDetailResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /api/v1/admin/users:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Admin xem danh sách tài khoản
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: role
          in: query
          schema:
            type: string
            enum: [USER, ADMIN]
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, SUSPENDED]
      responses:
        "200":
          description: Danh sách tài khoản
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /api/v1/admin/users/{id}/status:
    patch:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Admin cập nhật trạng thái tài khoản
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserStatusRequest"
      responses:
        "200":
          description: Cập nhật trạng thái tài khoản thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /api/v1/admin/audit-logs:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Admin xem audit log
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: actorUserId
          in: query
          schema:
            type: string
            format: uuid
        - name: entityType
          in: query
          schema:
            type: string
            enum: [recipe, user]
      responses:
        "200":
          description: Danh sách audit log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuditLogListResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /api/v1/chat/conversations:
    post:
      tags: [Chat]
      security:
        - bearerAuth: []
      summary: Tạo conversation Phụ Bếp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatConversationRequest"
      responses:
        "201":
          description: Conversation đã được tạo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatConversationResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/chat/conversations/{id}/messages:
    get:
      tags: [Chat]
      security:
        - bearerAuth: []
      summary: Xem message trong conversation Phụ Bếp
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Danh sách message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageListResponse"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    post:
      tags: [Chat]
      security:
        - bearerAuth: []
      summary: Gửi message và nhận trả lời từ Phụ Bếp
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendChatMessageRequest"
      responses:
        "201":
          description: Message user và assistant đã được lưu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendChatMessageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 12
    RecipeSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
    CookingSessionId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UuidId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    ValidationError:
      description: Query hoặc path parameter không hợp lệ
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Error:
      description: Lỗi nghiệp vụ hoặc phân quyền
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 128
        displayName:
          type: string
          minLength: 1
          maxLength: 120
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 128
    GoogleLoginRequest:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    UpdateProfileRequest:
      type: object
      required: [displayName]
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 120
    User:
      type: object
      required: [id, email, displayName, avatarUrl, role, status]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        avatarUrl:
          type: [string, "null"]
        role:
          type: string
          enum: [USER, ADMIN]
        status:
          type: string
          enum: [ACTIVE, SUSPENDED]
    TokenPair:
      type: object
      required: [accessToken, refreshToken, tokenType, expiresIn]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          const: Bearer
        expiresIn:
          type: integer
    AuthSession:
      type: object
      required: [user, tokens]
      properties:
        user:
          $ref: "#/components/schemas/User"
        tokens:
          $ref: "#/components/schemas/TokenPair"
    AuthSessionResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/AuthSession"
    UserResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/User"
    Category:
      type: object
      required: [id, slug, name]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
          enum:
            - Món xào
            - Món canh
            - Món chiên
            - Món hấp
            - Món chay
            - Tráng miệng
    RecipeDifficulty:
      type: string
      enum: [de, trung-binh, kho]
    RecipeSummary:
      type: object
      required:
        - id
        - slug
        - title
        - description
        - image
        - imageAlt
        - difficulty
        - cookTimeMinutes
        - baseServings
        - category
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string
        description:
          type: string
        image:
          type: string
        imageAlt:
          type: string
        difficulty:
          $ref: "#/components/schemas/RecipeDifficulty"
        cookTimeMinutes:
          type: integer
        baseServings:
          type: integer
        category:
          type: string
    SavedRecipe:
      allOf:
        - $ref: "#/components/schemas/RecipeSummary"
        - type: object
          required: [savedAt]
          properties:
            savedAt:
              type: string
              format: date-time
    RecipeIngredient:
      type: object
      required: [id, name, baseAmount, unit, prepNote, haveIt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        baseAmount:
          type: number
        unit:
          type: string
        prepNote:
          type: string
        haveIt:
          type: boolean
          description: Giai đoạn 1 luôn false; Giai đoạn 2 sẽ tính từ search session.
    RecipeStep:
      type: object
      required:
        - id
        - content
        - estimatedMinutes
        - isTricky
        - techniqueIcon
        - timerSeconds
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        estimatedMinutes:
          type: integer
        isTricky:
          type: boolean
        techniqueIcon:
          type: string
          enum: [dao, chao, noi, tron, hap]
        timerSeconds:
          type: [integer, "null"]
    RecipeDetail:
      allOf:
        - $ref: "#/components/schemas/RecipeSummary"
        - type: object
          required: [ingredients, steps, cookingTerms]
          properties:
            ingredients:
              type: array
              items:
                $ref: "#/components/schemas/RecipeIngredient"
            steps:
              type: array
              items:
                $ref: "#/components/schemas/RecipeStep"
            cookingTerms:
              type: object
              additionalProperties:
                type: string
    RecommendationRequest:
      type: object
      required: [ingredients]
      properties:
        ingredients:
          type: array
          minItems: 1
          maxItems: 30
          items:
            type: string
            minLength: 1
            maxLength: 80
        filters:
          $ref: "#/components/schemas/RecommendationFilters"
        page:
          type: integer
          minimum: 1
          default: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 12
    RecommendationFilters:
      type: object
      properties:
        category:
          type: string
          description: Slug hoặc tên danh mục
        difficulties:
          type: array
          minItems: 1
          maxItems: 3
          items:
            $ref: "#/components/schemas/RecipeDifficulty"
        maxCookTimeMinutes:
          type: integer
          minimum: 1
          maximum: 1440
        servings:
          type: integer
          minimum: 1
          maximum: 100
    RecipeRecommendation:
      allOf:
        - $ref: "#/components/schemas/RecipeSummary"
        - type: object
          required: [match]
          properties:
            match:
              $ref: "#/components/schemas/RecommendationMatch"
    RecommendationMatch:
      type: object
      required: [score, matchedIngredients, missingIngredients]
      properties:
        score:
          type: number
          minimum: 0
          maximum: 1
        matchedIngredients:
          type: array
          items:
            type: string
        missingIngredients:
          type: array
          items:
            type: string
    RecommendationMeta:
      allOf:
        - $ref: "#/components/schemas/PaginationMeta"
        - type: object
          required: [source]
          properties:
            source:
              $ref: "#/components/schemas/RecommendationSource"
    RecommendationSource:
      type: string
      enum: [database, gemini, empty]
    StartCookingSessionRequest:
      type: object
      required: [recipeSlug]
      properties:
        recipeSlug:
          type: string
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        servings:
          type: integer
          minimum: 1
          maximum: 100
    UpdateCookingSessionRequest:
      type: object
      minProperties: 1
      properties:
        currentStep:
          type: integer
          minimum: 1
        servings:
          type: integer
          minimum: 1
          maximum: 100
    FeedbackIssue:
      type: string
      enum:
        - cutting-meat-hard
        - oil-splatter
        - took-longer-than-expected
        - missing-ingredients
    SubmitFeedbackRequest:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        issues:
          type: array
          maxItems: 4
          uniqueItems: true
          default: []
          items:
            $ref: "#/components/schemas/FeedbackIssue"
        note:
          type: string
          maxLength: 1000
    CookingFeedback:
      type: object
      required:
        - id
        - cookingSessionId
        - recipeId
        - rating
        - issues
        - note
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        cookingSessionId:
          type: string
          format: uuid
        recipeId:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        issues:
          type: array
          items:
            $ref: "#/components/schemas/FeedbackIssue"
        note:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CookingFeedbackSummary:
      type: object
      required: [rating, issues, note, submittedAt]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        issues:
          type: array
          items:
            $ref: "#/components/schemas/FeedbackIssue"
        note:
          type: [string, "null"]
        submittedAt:
          type: string
          format: date-time
    PersonalizationSignals:
      type: object
      required:
        - preferEasyRecipes
        - preferQuickRecipes
        - preferIngredientFit
        - preferTechniqueGuidance
      properties:
        preferEasyRecipes:
          type: number
          minimum: 0
          maximum: 1
        preferQuickRecipes:
          type: number
          minimum: 0
          maximum: 1
        preferIngredientFit:
          type: number
          minimum: 0
          maximum: 1
        preferTechniqueGuidance:
          type: number
          minimum: 0
          maximum: 1
    FeedbackIssueCounts:
      type: object
      required:
        - cutting-meat-hard
        - oil-splatter
        - took-longer-than-expected
        - missing-ingredients
      properties:
        cutting-meat-hard:
          type: integer
          minimum: 0
        oil-splatter:
          type: integer
          minimum: 0
        took-longer-than-expected:
          type: integer
          minimum: 0
        missing-ingredients:
          type: integer
          minimum: 0
    PersonalizationInsight:
      type: object
      required:
        - feedbackCount
        - averageRating
        - confidence
        - signals
        - issueCounts
        - insights
        - updatedAt
      properties:
        feedbackCount:
          type: integer
          minimum: 0
        averageRating:
          type: number
          minimum: 0
          maximum: 5
        confidence:
          type: number
          minimum: 0
          maximum: 1
        signals:
          $ref: "#/components/schemas/PersonalizationSignals"
        issueCounts:
          $ref: "#/components/schemas/FeedbackIssueCounts"
        insights:
          type: array
          items:
            type: string
        updatedAt:
          type: [string, "null"]
          format: date-time
    CookingSessionStatus:
      type: string
      enum: [IN_PROGRESS, COMPLETED]
    CookingSession:
      type: object
      required:
        - id
        - recipe
        - currentStep
        - totalSteps
        - servings
        - status
        - startedAt
        - completedAt
        - feedback
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        recipe:
          $ref: "#/components/schemas/RecipeSummary"
        currentStep:
          type: integer
          minimum: 1
        totalSteps:
          type: integer
          minimum: 0
        servings:
          type: integer
          minimum: 1
        status:
          $ref: "#/components/schemas/CookingSessionStatus"
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: [string, "null"]
          format: date-time
        feedback:
          oneOf:
            - $ref: "#/components/schemas/CookingFeedbackSummary"
            - type: "null"
        updatedAt:
          type: string
          format: date-time
    CookingSessionResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/CookingSession"
    SubmitFeedbackResponse:
      type: object
      required: [success, data, meta]
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/CookingFeedback"
        meta:
          type: object
          required: [personalization]
          properties:
            personalization:
              $ref: "#/components/schemas/PersonalizationInsight"
    PersonalizationResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/PersonalizationInsight"
    RecipeStatus:
      type: string
      enum: [DRAFT, PUBLISHED, HIDDEN]
    RecipeSource:
      type: string
      enum: [ADMIN, SEED, GEMINI]
    ModerationStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED]
    AdminRecipeIngredientInput:
      type: object
      required: [name, amount, unit]
      properties:
        name:
          type: string
          maxLength: 150
        amount:
          type: number
          exclusiveMinimum: 0
        unit:
          type: string
          maxLength: 50
        prepNote:
          type: string
          maxLength: 200
          default: ""
    AdminRecipeStepInput:
      type: object
      required: [content, estimatedMinutes, techniqueIcon]
      properties:
        content:
          type: string
          minLength: 10
          maxLength: 600
        estimatedMinutes:
          type: integer
          minimum: 0
          maximum: 240
        techniqueIcon:
          type: string
          enum: [dao, chao, noi, tron, hap]
        isTricky:
          type: boolean
          default: false
        timerSeconds:
          type: [integer, "null"]
          minimum: 1
    AdminRecipeWriteRequest:
      type: object
      required:
        - slug
        - title
        - description
        - imageAlt
        - difficulty
        - cookTimeMinutes
        - baseServings
        - categorySlug
        - ingredients
        - steps
      properties:
        slug:
          type: string
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
          maxLength: 180
        title:
          type: string
          minLength: 5
          maxLength: 200
        description:
          type: string
          minLength: 10
          maxLength: 1000
        imageAlt:
          type: string
          minLength: 5
          maxLength: 250
        difficulty:
          $ref: "#/components/schemas/RecipeDifficulty"
        cookTimeMinutes:
          type: integer
          minimum: 1
          maximum: 1440
        baseServings:
          type: integer
          minimum: 1
          maximum: 100
        categorySlug:
          type: string
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        status:
          $ref: "#/components/schemas/RecipeStatus"
        ingredients:
          type: array
          minItems: 1
          maxItems: 30
          items:
            $ref: "#/components/schemas/AdminRecipeIngredientInput"
        steps:
          type: array
          minItems: 1
          maxItems: 30
          items:
            $ref: "#/components/schemas/AdminRecipeStepInput"
    AdminRecipeMultipartWriteRequest:
      type: object
      required: [recipe, image]
      properties:
        recipe:
          type: string
          description: JSON string theo AdminRecipeWriteRequest, khong chua field image.
        image:
          type: string
          format: binary
          description: File anh JPEG, PNG, WebP hoac GIF toi da 5MB; backend upload len Supabase Storage.
    AdminRecipePatchRequest:
      type: object
      description: Cùng field với AdminRecipeWriteRequest nhưng tất cả field đều optional.
      properties:
        slug:
          type: string
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
          maxLength: 180
        title:
          type: string
          minLength: 5
          maxLength: 200
        description:
          type: string
          minLength: 10
          maxLength: 1000
        imageAlt:
          type: string
          minLength: 5
          maxLength: 250
        difficulty:
          $ref: "#/components/schemas/RecipeDifficulty"
        cookTimeMinutes:
          type: integer
          minimum: 1
          maximum: 1440
        baseServings:
          type: integer
          minimum: 1
          maximum: 100
        categorySlug:
          type: string
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        status:
          $ref: "#/components/schemas/RecipeStatus"
        ingredients:
          type: array
          minItems: 1
          maxItems: 30
          items:
            $ref: "#/components/schemas/AdminRecipeIngredientInput"
        steps:
          type: array
          minItems: 1
          maxItems: 30
          items:
            $ref: "#/components/schemas/AdminRecipeStepInput"
    AdminRecipeMultipartPatchRequest:
      type: object
      properties:
        recipe:
          type: string
          description: JSON string theo AdminRecipePatchRequest.
        image:
          type: string
          format: binary
          description: File anh JPEG, PNG, WebP hoac GIF toi da 5MB; backend upload len Supabase Storage.
    AdminRecipeIngredient:
      type: object
      required: [id, name, amount, unit, prepNote, displayOrder]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        amount:
          type: number
        unit:
          type: string
        prepNote:
          type: string
        displayOrder:
          type: integer
    AdminRecipeStep:
      type: object
      required:
        - id
        - displayOrder
        - content
        - estimatedMinutes
        - techniqueIcon
        - isTricky
        - timerSeconds
      properties:
        id:
          type: string
          format: uuid
        displayOrder:
          type: integer
        content:
          type: string
        estimatedMinutes:
          type: integer
        techniqueIcon:
          type: string
          enum: [dao, chao, noi, tron, hap]
        isTricky:
          type: boolean
        timerSeconds:
          type: [integer, "null"]
    AdminRecipe:
      type: object
      required:
        - id
        - slug
        - title
        - description
        - image
        - imageAlt
        - difficulty
        - cookTimeMinutes
        - baseServings
        - category
        - status
        - source
        - aiModel
        - moderationStatus
        - createdBy
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string
        description:
          type: string
        image:
          type: string
        imageAlt:
          type: string
        difficulty:
          $ref: "#/components/schemas/RecipeDifficulty"
        cookTimeMinutes:
          type: integer
        baseServings:
          type: integer
        category:
          $ref: "#/components/schemas/Category"
        status:
          $ref: "#/components/schemas/RecipeStatus"
        source:
          $ref: "#/components/schemas/RecipeSource"
        aiModel:
          type: [string, "null"]
        moderationStatus:
          $ref: "#/components/schemas/ModerationStatus"
        createdBy:
          oneOf:
            - type: object
              required: [id, email]
              properties:
                id:
                  type: string
                  format: uuid
                email:
                  type: [string, "null"]
            - type: "null"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AdminRecipeDetail:
      allOf:
        - $ref: "#/components/schemas/AdminRecipe"
        - type: object
          required: [ingredients, steps]
          properties:
            ingredients:
              type: array
              items:
                $ref: "#/components/schemas/AdminRecipeIngredient"
            steps:
              type: array
              items:
                $ref: "#/components/schemas/AdminRecipeStep"
    AdminRecipeListResponse:
      type: object
      required: [success, data, meta]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/AdminRecipe"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
    AdminRecipeDetailResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/AdminRecipeDetail"
    AdminModerateRecipeRequest:
      type: object
      required: [moderationStatus]
      properties:
        moderationStatus:
          type: string
          enum: [APPROVED, REJECTED]
    AdminUser:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          required: [provider, createdAt, updatedAt]
          properties:
            provider:
              type: string
              enum: [PASSWORD, GOOGLE]
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    AdminUserListResponse:
      type: object
      required: [success, data, meta]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/AdminUser"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
    AdminUserResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/AdminUser"
    AdminUpdateUserStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ACTIVE, SUSPENDED]
    AdminAuditLog:
      type: object
      required: [id, actorUserId, action, entityType, entityId, details, createdAt]
      properties:
        id:
          type: string
          format: uuid
        actorUserId:
          type: [string, "null"]
          format: uuid
        action:
          type: string
        entityType:
          type: string
          enum: [recipe, user]
        entityId:
          type: [string, "null"]
          format: uuid
        details:
          type: object
        createdAt:
          type: string
          format: date-time
    AdminAuditLogListResponse:
      type: object
      required: [success, data, meta]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/AdminAuditLog"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
    CreateChatConversationRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 160
    SendChatMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 2000
    ChatConversation:
      type: object
      required: [id, userId, title, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [ACTIVE, ARCHIVED]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ChatRecipeReference:
      type: object
      required: [id, slug, title]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string
    ChatMessage:
      type: object
      required:
        - id
        - conversationId
        - role
        - content
        - recipeReferences
        - model
        - latencyMs
        - tokenCount
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        conversationId:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        recipeReferences:
          type: array
          items:
            $ref: "#/components/schemas/ChatRecipeReference"
        model:
          type: [string, "null"]
        latencyMs:
          type: [integer, "null"]
        tokenCount:
          type: [integer, "null"]
        createdAt:
          type: string
          format: date-time
    ChatConversationResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/ChatConversation"
    ChatMessageListResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
    SendChatMessageResult:
      type: object
      required: [conversation, userMessage, assistantMessage]
      properties:
        conversation:
          $ref: "#/components/schemas/ChatConversation"
        userMessage:
          $ref: "#/components/schemas/ChatMessage"
        assistantMessage:
          $ref: "#/components/schemas/ChatMessage"
    SendChatMessageResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/SendChatMessageResult"
    PaginationMeta:
      type: object
      required: [page, limit, total, totalPages]
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details: {}
